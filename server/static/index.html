<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clipboard Relay</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7f4;
        color: #1d1d1f;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        box-sizing: border-box;
        width: min(760px, 100%);
        margin: 0 auto;
        padding: 20px;
      }

      h1 {
        margin: 10px 0 18px;
        font-size: 24px;
        font-weight: 700;
      }

      label {
        display: block;
        margin: 16px 0 8px;
        font-size: 14px;
        font-weight: 650;
      }

      input,
      select,
      textarea,
      button {
        box-sizing: border-box;
        width: 100%;
        border-radius: 8px;
        font: inherit;
      }

      input,
      select,
      textarea {
        border: 1px solid #c8c8c2;
        background: #ffffff;
        color: inherit;
        padding: 12px;
      }

      textarea {
        min-height: 23vh;
        resize: vertical;
        line-height: 1.5;
      }

      button {
        margin-top: 14px;
        border: 0;
        background: #185abc;
        color: #ffffff;
        padding: 13px 16px;
        font-weight: 700;
      }

      .secondary {
        background: transparent;
        border: 1px solid #8d9298;
        color: inherit;
      }

      button:disabled {
        opacity: 0.62;
      }

      #status {
        min-height: 24px;
        margin-top: 14px;
        font-size: 15px;
      }

      .connection-status {
        display: flex;
        align-items: center;
        min-height: 24px;
        margin-top: 9px;
        color: #5f6368;
        font-size: 14px;
      }

      .connection-status-dot {
        width: 8px;
        height: 8px;
        margin-right: 8px;
        border-radius: 50%;
        background: #8d9298;
      }

      .connection-status.online {
        color: #137333;
      }

      .connection-status.online .connection-status-dot {
        background: #137333;
      }

      .connection-status.offline {
        color: #9a6700;
      }

      .connection-status.offline .connection-status-dot {
        background: #c58b00;
      }

      .connection-status.error {
        color: #b3261e;
      }

      .connection-status.error .connection-status-dot {
        background: #b3261e;
      }

      .ok {
        color: #137333;
      }

      .bad {
        color: #b3261e;
      }

      .device-panel {
        margin-top: 28px;
        border-top: 1px solid #c8c8c2;
        padding-top: 12px;
      }

      .device-panel h2 {
        margin-bottom: 4px;
        font-size: 19px;
      }

      .device-list {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .device-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        border: 1px solid #c8c8c2;
        border-radius: 8px;
        padding: 12px;
      }

      .device-name {
        font-weight: 700;
      }

      .device-meta {
        margin-top: 4px;
        color: #5f6368;
        font-size: 13px;
      }

      .delete-device {
        width: auto;
        margin: 0;
        background: #b3261e;
        padding: 8px 12px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #111315;
          color: #f1f3f4;
        }

        input,
        select,
        textarea {
          border-color: #4b4f54;
          background: #1b1f23;
        }

        .device-panel,
        .device-row {
          border-color: #4b4f54;
        }

        .device-meta {
          color: #bdc1c6;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Clipboard Relay</h1>

      <label for="apiKey">密码</label>
      <input id="apiKey" autocomplete="off" inputmode="text" type="password" />
      <button id="clearKey" class="secondary" type="button">清除密码</button>

      <label for="target">目标设备</label>
      <select id="target"></select>
      <div id="connectionStatus" class="connection-status" aria-live="polite">
        <span class="connection-status-dot" aria-hidden="true"></span>
        <span id="connectionStatusText">请输入密码以查询设备连接状态。</span>
      </div>

      <label for="text">文本</label>
      <textarea id="text" autofocus></textarea>

      <button id="send" type="button">发送到目标设备剪贴板</button>
      <div id="status" aria-live="polite"></div>

      <section class="device-panel" aria-labelledby="devicePanelTitle">
        <h2 id="devicePanelTitle">设备管理</h2>
        <div id="deviceListStatus" class="device-meta" aria-live="polite">
          请输入密码以查看已注册设备。
        </div>
        <div id="deviceList" class="device-list"></div>
      </section>
    </main>

    <script>
      const API_KEY_STORAGE_KEY = "clipboardRelayApiKey";
      const TARGET_STORAGE_KEY = "clipboardRelayTarget";
      const apiKeyInput = document.querySelector("#apiKey");
      const targetSelect = document.querySelector("#target");
      const textInput = document.querySelector("#text");
      const sendButton = document.querySelector("#send");
      const clearKeyButton = document.querySelector("#clearKey");
      const statusEl = document.querySelector("#status");
      const connectionStatusEl = document.querySelector("#connectionStatus");
      const connectionStatusTextEl = document.querySelector("#connectionStatusText");
      const deviceListEl = document.querySelector("#deviceList");
      const deviceListStatusEl = document.querySelector("#deviceListStatus");
      let devices = [];
      const STATUS_POLL_INTERVAL_MS = 4000;
      let latestConnectionStatusRequestId = 0;

      const savedKey = localStorage.getItem(API_KEY_STORAGE_KEY);
      if (savedKey) {
        apiKeyInput.value = savedKey;
      }

      const savedTarget = localStorage.getItem(TARGET_STORAGE_KEY);
      if (savedTarget && targetSelect.querySelector(`option[value="${savedTarget}"]`)) {
        targetSelect.value = savedTarget;
      }

      function setStatus(message, kind) {
        statusEl.textContent = message;
        statusEl.className = kind || "";
      }

      function updateTargetOptions() {
        const selectedTarget = targetSelect.value || localStorage.getItem(TARGET_STORAGE_KEY);
        const options = devices.map((device) => {
          const option = document.createElement("option");
          option.value = device.device_id;
          option.textContent = `${device.device_id}${device.online ? "（在线）" : "（离线）"}`;
          option.selected = device.device_id === selectedTarget;
          return option;
        });
        targetSelect.replaceChildren(...options);
      }

      function clearDevices() {
        devices = [];
        updateTargetOptions();
        deviceListEl.replaceChildren();
      }

      function formatLastActive(value) {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
      }

      function createDeviceRow(device) {
        const row = document.createElement("div");
        row.className = "device-row";

        const details = document.createElement("div");
        const name = document.createElement("div");
        name.className = "device-name";
        name.textContent = `${device.device_id} · ${device.online ? "在线" : "离线"}`;
        const metadata = document.createElement("div");
        metadata.className = "device-meta";
        metadata.textContent = `最后活跃：${formatLastActive(device.last_active)}`;
        details.append(name, metadata);

        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "delete-device";
        deleteButton.dataset.deviceId = device.device_id;
        deleteButton.textContent = "删除";
        row.append(details, deleteButton);
        return row;
      }

      function renderDeviceList() {
        deviceListEl.replaceChildren(...devices.map(createDeviceRow));
        deviceListStatusEl.textContent = devices.length ? `共 ${devices.length} 台设备。` : "当前没有已注册设备。";
      }

      function setConnectionStatus(message, kind) {
        connectionStatusTextEl.textContent = message;
        connectionStatusEl.className = `connection-status${kind ? ` ${kind}` : ""}`;
      }

      async function refreshConnectionStatus() {
        const requestId = ++latestConnectionStatusRequestId;
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
          clearDevices();
          deviceListStatusEl.textContent = "请输入密码以查看已注册设备。";
          setConnectionStatus("请输入密码以查询设备连接状态。", "");
          return;
        }

        try {
          const response = await fetch("/api/devices", {
            headers: { "X-API-Key": apiKey },
          });

          if (requestId !== latestConnectionStatusRequestId) {
            return;
          }

          if (response.status === 401) {
            clearDevices();
            setConnectionStatus("密码错误。", "error");
            deviceListStatusEl.textContent = "密码错误。";
            return;
          }
          if (response.status === 500) {
            setConnectionStatus("服务端密码未配置。", "error");
            return;
          }
          if (!response.ok) {
            setConnectionStatus("无法连接到中继服务器。", "error");
            return;
          }

          const payload = await response.json();
          if (!Array.isArray(payload)) {
            throw new Error("invalid status payload");
          }

          if (requestId !== latestConnectionStatusRequestId) {
            return;
          }

          devices = payload;
          updateTargetOptions();
          renderDeviceList();

          const target = targetSelect.value;
          const selectedDevice = devices.find((device) => device.device_id === target);
          if (!selectedDevice) {
            setConnectionStatus("当前没有可用设备。", "offline");
          } else if (selectedDevice.online) {
            setConnectionStatus(`${target}已连接。`, "online");
          } else {
            setConnectionStatus(`${target}未连接。`, "offline");
          }
        } catch (error) {
          if (requestId === latestConnectionStatusRequestId) {
            setConnectionStatus("无法连接到中继服务器。", "error");
          }
        }
      }

      clearKeyButton.addEventListener("click", () => {
        localStorage.removeItem(API_KEY_STORAGE_KEY);
        apiKeyInput.value = "";
        apiKeyInput.focus();
        setStatus("密码已清除。", "");
        refreshConnectionStatus();
      });

      deviceListEl.addEventListener("click", async (event) => {
        const button = event.target.closest(".delete-device");
        if (!button) return;
        const deviceId = button.dataset.deviceId;
        if (!window.confirm(`确定要删除设备“${deviceId}”吗？在线连接会立即断开。`)) return;

        button.disabled = true;
        try {
          const response = await fetch(`/api/devices/${encodeURIComponent(deviceId)}`, {
            method: "DELETE",
            headers: { "X-API-Key": apiKeyInput.value.trim() },
          });
          if (!response.ok) {
            const payload = await response.json().catch(() => ({}));
            throw new Error(payload.detail || `HTTP ${response.status}`);
          }
          setStatus(`设备 ${deviceId} 已删除。`, "ok");
          await refreshConnectionStatus();
        } catch (error) {
          setStatus(`删除失败：${error.message}`, "bad");
          button.disabled = false;
        }
      });

      targetSelect.addEventListener("change", () => {
        localStorage.setItem(TARGET_STORAGE_KEY, targetSelect.value);
        refreshConnectionStatus();
      });

      apiKeyInput.addEventListener("change", () => {
        refreshConnectionStatus();
      });

      sendButton.addEventListener("click", async () => {
        const apiKey = apiKeyInput.value.trim();
        const target = targetSelect.value;
        const text = textInput.value;

        if (!apiKey) {
          setStatus("请输入密码。", "bad");
          return;
        }

        if (!target) {
          setStatus("当前没有可用设备。", "bad");
          return;
        }

        if (!text.trim()) {
          setStatus("请输入要发送的文本。", "bad");
          return;
        }

        localStorage.setItem(API_KEY_STORAGE_KEY, apiKey);
        localStorage.setItem(TARGET_STORAGE_KEY, target);
        sendButton.disabled = true;
        setStatus("发送中...", "");

        try {
          const response = await fetch("/api/send", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-API-Key": apiKey,
            },
            body: JSON.stringify({ target, text }),
          });

          if (response.ok) {
            textInput.value = "";
            setStatus("发送成功。", "ok");
          } else if (response.status === 401) {
            setStatus("密码错误。", "bad");
          } else if (response.status === 503) {
            setStatus("目标设备未连接。", "bad");
          } else if (response.status === 400) {
            setStatus("请求格式错误或目标设备无效。", "bad");
          } else {
            setStatus(`发送失败：${response.status}`, "bad");
          }
        } catch (error) {
          setStatus("网络连接失败。", "bad");
        } finally {
          sendButton.disabled = false;
        }
      });

      updateTargetOptions();
      refreshConnectionStatus();
      window.setInterval(refreshConnectionStatus, STATUS_POLL_INTERVAL_MS);
    </script>
  </body>
</html>
